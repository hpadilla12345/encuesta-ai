[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"

[functions."generate-report"]
  timeout = 26

[functions."generate-company-report"]
  timeout = 26

[functions."generate-commercial-report"]
  timeout = 26

[functions."process-event-reports"]
  timeout = 26

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

[[redirects]]
  from = "/"
  to = "/admin/"
  status = 302

[[redirects]]
  from = "/summary"
  to = "/summary/"
  status = 301

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Resumen del diagnóstico</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#f5f7fa;color:#1a2332;min-height:100vh}
  #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px}
  .spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#0b1a30;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #error-view{display:none;text-align:center;padding:60px 24px;color:#64748b}
  #content{display:none}
  @media print{body{background:#fff}#print-bar{display:none}*{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:14px;color:#64748b">Cargando diagnóstico...</div>
</div>

<div id="error-view">
  <div style="font-size:48px;margin-bottom:16px">📋</div>
  <h2 style="font-size:20px;color:#0b1a30;margin-bottom:8px">Evento no encontrado</h2>
  <p>Verifica que el enlace sea correcto o que el evento esté activo.</p>
</div>

<div id="content"></div>

<div id="print-bar" style="display:none;position:fixed;bottom:20px;right:20px;display:flex;gap:8px">
  <button onclick="window.print()" style="background:#0b1a30;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 4px 12px rgba(0,0,0,.2)">🖨 Imprimir / Guardar</button>
  <button onclick="location.reload()" style="background:#0d9488;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 4px 12px rgba(0,0,0,.2)">🔄 Actualizar</button>
</div>

<script>
const params = new URLSearchParams(location.search);
const slug = params.get('evento') || params.get('slug') || 'demo';

(async () => {
  try {
    const res = await fetch(`/.netlify/functions/generate-summary?evento=${encodeURIComponent(slug)}`);
    if (!res.ok) throw new Error('not found');
    const html = await res.text();

    // Inject into content div — strip outer html/body tags
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // Copy styles from fetched doc
    doc.querySelectorAll('style').forEach(s => {
      const ns = document.createElement('style');
      ns.textContent = s.textContent;
      document.head.appendChild(ns);
    });

    // Set content
    const body = doc.body;
    document.getElementById('content').innerHTML = body.innerHTML;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('print-bar').style.display = 'flex';

    // Update page title
    const h1 = doc.querySelector('h1');
    if (h1) document.title = `Diagnóstico · ${h1.textContent.trim()}`;

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-view').style.display = 'block';
  }
})();
</script>
</body>
</html>
